<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    >

    <title>Demo Slideshow (neu)</title>

    <!-- Aktuelle reveal.js Version von CDN laden -->
    <link rel="stylesheet" href="https://unpkg.com/reveal.js@5.2.1/dist/reset.css">
    <link rel="stylesheet" href="https://unpkg.com/reveal.js@5.2.1/dist/reveal.css">
    <link rel="stylesheet" href="https://unpkg.com/reveal.js@5.2.1/dist/theme/black.css" id="theme">
    <link rel="stylesheet" href="https://unpkg.com/reveal.js@5.2.1/plugin/highlight/monokai.css" id="highlight-theme">

    <style>
      body {
        background: #000;
        color: #fff;
      }

      .reveal {
        font-size: 28px;
      }

      .slide-image {
        max-width: 100%;
        max-height: 80vh;
        display: block;
        margin: 0 auto;
        transition: transform 0.25s ease-in-out;
      }

      .caption {
        margin-top: 0.5em;
        font-size: 0.6em;
        text-align: center;
        opacity: 0.75;
      }
    </style>
  </head>
  <body>
    <div class="reveal">
      <div class="slides" id="slides">
        <!-- Der Inhalt wird aus static/slides.csv per JavaScript erzeugt -->
      </div>
    </div>

    <!-- reveal.js von CDN -->
    <script src="https://unpkg.com/reveal.js@5.2.1/dist/reveal.js"></script>
    <script src="https://unpkg.com/reveal.js@5.2.1/plugin/markdown/markdown.js"></script>
    <script src="https://unpkg.com/reveal.js@5.2.1/plugin/highlight/highlight.js"></script>
    <script src="https://unpkg.com/reveal.js@5.2.1/plugin/notes/notes.js"></script>
    <script src="https://unpkg.com/reveal.js@5.2.1/plugin/zoom/zoom.js"></script>

    <!-- Eigene Logik für CSV & Events -->
    <script src="static/js/client.js"></script>
  </body>
</html>
